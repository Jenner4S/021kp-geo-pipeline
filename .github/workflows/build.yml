name: Build Executables

on:
  push:
    branches: [master, main, release/*]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: 021kp-geo-pipeline-win64
            spec: geo-pipeline-windows.spec
          - os: macos-14
            artifact_name: 021kp-geo-pipeline-macos-arm64
            spec: 021kp-geo-pipeline-macos-arm64.spec
          - os: ubuntu-22.04
            artifact_name: 021kp-geo-pipeline-linux-amd64
            spec: geo-pipeline-linux.spec

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pyinstaller

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller --clean --noconfirm ${{ matrix.spec }}

      - name: Build (macOS)
        if: matrix.os == 'macos-14'
        run: pyinstaller --clean --noconfirm ${{ matrix.spec }}

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: pyinstaller --clean --noconfirm ${{ matrix.spec }}

      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ github.workspace }}/dist/021kp-geo-pipeline.exe
          retention-days: 30

      - name: Upload artifact (macOS)
        uses: actions/upload-artifact@v4
        if: matrix.os == 'macos-14'
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ github.workspace }}/dist/021kp-geo-pipeline-macos-arm64
          retention-days: 30

      - name: Upload artifact (Linux)
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-22.04'
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ github.workspace }}/dist/021kp-geo-pipeline
          retention-days: 30
